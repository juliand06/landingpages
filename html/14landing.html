<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen to yourself</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/14landing.css">
</head>

<body>
    <div class="landing-container">

        <div class="content-left">
            <h1 class="main-heading">
                Listen to yourself<br>
                Follow your heart
            </h1>
            <p class="description">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit. Faucibus in libero risus semper habitant arcu
                eget. Et integer facilisi.
            </p>
            <a href="#" class="btn-primary">Download the App</a>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number">4.9</span>
                    <span class="stat-label">Lorem ipsum<br>dolor amet</span>
                </div>
                <!-- vertical divider -->
                <div class="stat-divider"></div>

                <div class="stat-item">
                    <span class="stat-number">876K</span>
                    <span class="stat-label">Lorem ipsum<br>dolor amet</span>
                </div>
                <!-- vertical divider -->
                <div class="stat-divider"></div>

                <div class="stat-item">
                    <span class="stat-number">No.1</span>
                    <span class="stat-label">Lorem ipsum<br>dolor amet</span>
                </div>
            </div>
        </div>

        <div class="images-right">
            <!-- Decorative stars and items -->
            <img class="decor-img star-top-right" src="img/Star 1.png" alt="Star graphic dark">
            <img class="decor-img star-bottom-right" src="img/Star 2.png" alt="Star graphic yellow">
            <!-- Portals (4-pointed stars mapping visually) -->
            <img class="decor-img portal-middle" src="img/Portal.png" alt="Grey star graphic">
            <img class="decor-img portal-top-left" src="img/Portal (1).png" alt="White star graphic">

            <!-- Background Cards Images directly (instead of CSS shapes) -->
            <img class="bg-card img-bg-brown" src="img/Bg brown.png" alt="Dark angled background">
            <img class="bg-card img-bg-yellow" src="img/bg yellow.png" alt="Yellow angled background">

            <img class="decor-img img-heart" src="img/Heart 1.png" alt="Large heart graphic">

            <!-- Foreground Phone Mockup -->
            <div class="phone-mockup">
                <img src="img/unsplash_N_xjrdKZPkw.png" alt="Music App Interface on Phone">
            </div>

        </div>

    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Design - 45landing</title>
    <link rel="stylesheet" href="css/45landing.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="grid-container">
        <div class="panel grid-hero" style="background-image: url('img/Image left (1).png')">
            <div class="hero-content">
                <h1 class="hero-title">Design, create, <br> and be passionate</h1>
                <p class="hero-subtitle">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Cursus imperdiet sed
                    id elementum.</p>
                <a href="#" class="btn-primary">Get started</a>
            </div>
        </div>

        <div class="panel grid-01">
            <div class="panel-tag">01</div>
            <div class="panel-info">Discover the world</div>
            <div class="panel-img-wrapper">
                <img src="img/Image right.png" alt="Retro Macintosh">
            </div>
        </div>

        <div class="panel grid-02">
            <div class="panel-tag">02</div>
            <div class="panel-info">Grow your heart</div>
            <div class="panel-img-wrapper">
                <img src="img/Image bottom left - left.png" alt="Abstract Shape">
            </div>
        </div>

        <div class="panel grid-03">
            <div class="panel-tag">03</div>
            <div class="panel-info">Live and love</div>
            <div class="panel-img-wrapper">
                <img src="img/Image bottom left - right.png" alt="Ripple Graphic">
            </div>
        </div>
    </div>
</body>

</html>
